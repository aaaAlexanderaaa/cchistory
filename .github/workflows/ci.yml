name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "./server[dev]"
      - name: Lint backend
        run: python -m ruff check server/cchistory server/tests
      - name: Run backend tests
        run: pytest server/tests
      - name: Benchmark gate
        run: |
          cd server
          python scripts/benchmark_index.py --entries 2500 --iterations 25 --list-p95-ms 60 --search-p95-ms 90

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend dependencies
        run: |
          cd web
          npm install
      - name: Run frontend tests
        run: |
          cd web
          npm run test
      - name: Build frontend
        run: |
          cd web
          npm run build
